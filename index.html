<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Web 🔥</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4b2b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff416c;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🔥 Mi Web</h1>
  <p>Mi backend ya está funcionando 🚀</p>
  <button onclick="alert('Funciona 😎')">Probar</button>
</div>

</body>
</html>
